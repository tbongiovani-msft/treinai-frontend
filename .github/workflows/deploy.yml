name: "Build & Deploy Static Web App"

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    name: "Build & Deploy"
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build & Deploy SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          output_location: "dist"
          app_build_command: "npm run build"
        env:
          VITE_FUNC_ALUNOS: ${{ vars.VITE_FUNC_ALUNOS }}
          VITE_FUNC_TREINOS: ${{ vars.VITE_FUNC_TREINOS }}
          VITE_FUNC_ATIVIDADES: ${{ vars.VITE_FUNC_ATIVIDADES }}
          VITE_FUNC_AVALIACOES: ${{ vars.VITE_FUNC_AVALIACOES }}
          VITE_FUNC_NUTRICAO: ${{ vars.VITE_FUNC_NUTRICAO }}
          VITE_FUNC_RELATORIOS: ${{ vars.VITE_FUNC_RELATORIOS }}
          VITE_FUNC_ADMIN: ${{ vars.VITE_FUNC_ADMIN }}

  close_pull_request:
    name: "Close PR Environment"
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Close SWA Staging
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: "close"
